name: CI Pipeline - FastAPI CRUD Todo

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  tests:
    name: Tests, UI, and reports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run API tests with coverage
        run: |
          pytest tests/ -v -m "not ui" \
            --cov=main \
            --cov=routers \
            --cov=models \
            --cov=schemas \
            --cov=database \
            --cov-report=term-missing \
            --cov-report=html:coverage-report \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml \
            --tb=short

      - name: Run UI tests
        run: pytest tests/ -v -m ui --junitxml=ui-test-results.xml --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 30

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            ui-test-results.xml
          retention-days: 30

      - name: Write job summary
        if: always()
        run: |
          echo "### Test results" >> "$GITHUB_STEP_SUMMARY"
          echo "- API tests: test-results.xml" >> "$GITHUB_STEP_SUMMARY"
          echo "- UI tests: ui-test-results.xml" >> "$GITHUB_STEP_SUMMARY"
          echo "- Coverage: coverage-report artifact and coverage.xml" >> "$GITHUB_STEP_SUMMARY"
